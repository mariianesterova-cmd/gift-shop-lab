<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Georgia', serif; }
        .reg-card { background: #1a1a1a; border: 1px solid #D4AF37; padding: 40px; margin-top: 100px; }
        input { background: transparent !important; border: none !important; border-bottom: 1px solid #333 !important; color: white !important; border-radius: 0 !important; }
        input:focus { border-bottom: 1px solid #D4AF37 !important; box-shadow: none !important; }
        .btn-gold { background: #D4AF37; color: black; border-radius: 0; border: none; font-weight: bold; text-transform: uppercase; }
        label { color: #D4AF37; font-size: 0.8rem; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="reg-card col-md-4">
            <h2 class="text-center mb-4" style="color: #D4AF37; letter-spacing: 2px;">JOIN THE CLUB</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-gold w-100 mt-4">Зареєструватися</button>
            </form>
            <div class="text-center mt-3">
                <a href="/store/" class="text-muted small">Назад до магазину</a>
            </div>
        </div>
    </div>
</body>
</html>
