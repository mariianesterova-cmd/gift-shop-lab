<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #ffffff; font-family: 'Georgia', serif; }
        .gold-text { color: #D4AF37 !important; }
        .cart-item { border-bottom: 1px solid #333; padding: 20px 0; }
        .btn-remove { color: #ff4d4d; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }
        .btn-checkout { background: #D4AF37; color: black; border: none; padding: 15px 40px; font-weight: bold; width: 100%; }
        /* Виправляємо видимість тексту */
        p, span, td { color: #e0e0e0 !important; } 
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="gold-text text-center mb-5">ВАШ КОШИК</h1>
        {% if cart_items %}
            {% for item in cart_items %}
            <div class="cart-item d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="gold-text m-0">{{ item.product.name }}</h5>
                    <small>Кількість: {{ item.quantity }}</small>
                </div>
                <div class="text-end">
                    <div class="mb-2">{{ item.subtotal }} ₴</div>
                    <a href="{% url 'remove_from_cart' item.product.id %}" class="btn-remove">Видалити</a>
                </div>
            </div>
            {% endfor %}
            <div class="mt-5 text-end">
                <h3 class="gold-text">РАЗОМ: {{ total }} ₴</h3>
                <a href="{% url 'checkout' %}" class="btn btn-checkout mt-3">ОФОРМИТИ ЗАМОВЛЕННЯ</a>
            </div>
        {% else %}
            <div class="text-center mt-5">
                <p>Кошик порожній</p>
                <a href="/store/" class="gold-text">Повернутися до покупок</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
