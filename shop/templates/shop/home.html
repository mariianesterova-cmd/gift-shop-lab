<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GOLDEN GIFT | Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --gray-gold: #1c1c1c; }
        
        body { 
            background: var(--dark); 
            /* Додамо легкий градієнт на фоні для глибини */
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            color: #fff; 
            font-family: 'Georgia', serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            margin: 0;
        }

        .hero-box { 
            border: 1px solid var(--gold); 
            padding: 60px; 
            text-align: center; 
            
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }

        .btn-gold { 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            border-radius: 0; 
            padding: 14px 30px; 
            text-transform: uppercase; 
            transition: 0.4s; 
            text-decoration: none; 
            display: block; 
            margin: 20px 0; 
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .btn-gold:hover { 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        h1 { 
            letter-spacing: 8px; 
            color: var(--gold); 
            font-weight: bold;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .tagline {
            color: #ffffff !important;
            font-style: italic;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .create-account {
            color: var(--gold) !important;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .create-account:hover {
            color: #fff !important;
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="hero-box shadow-lg">
            <h1 class="mb-4">GOLDEN GIFT</h1>
            <p class="tagline mb-5">Вишуканість у кожній деталі</p>
            
            <div class="menu-options">
                <a href="/store/" class="btn-gold">Увійти як Клієнт</a>
                <a href="/admin/" class="btn-gold" style="opacity: 0.6; font-size: 0.7rem;">Панель Адміністратора</a>
                
                <a href="/register/" class="create-account d-block mt-4 text-decoration-none">
                    Створити акаунт
                </a>
            </div>
        </div>
    </div>
</body>
</html>
